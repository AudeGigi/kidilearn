<script>
// ═══════════════════════════════════════════
// ENREGISTREMENT SERVICE WORKER (PWA)
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[PWA] Service Worker enregistré :', reg.scope))
      .catch(err => console.warn('[PWA] Erreur SW :', err));
  });
}

// ═══════════════════════════════════════════
// GESTION INSTALLATION PWA
// ═══════════════════════════════════════════
let deferredPrompt = null;
const banner = document.getElementById('pwa-banner');
const installBtn = document.getElementById('pwa-install-btn');
const closeBtn = document.getElementById('pwa-close-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Afficher la bannière après 3 secondes
  setTimeout(() => banner.classList.add('show'), 3000);
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  console.log('[PWA] Installation :', outcome);
  deferredPrompt = null;
  banner.classList.remove('show');
});

closeBtn.addEventListener('click', () => {
  banner.classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  console.log('[PWA] Application installée avec succès !');
  banner.classList.remove('show');
});

let _kdlVoices=[];
function _kdlLoadVoices(){_kdlVoices=speechSynthesis.getVoices();}
if("speechSynthesis" in window){
  _kdlLoadVoices();
  speechSynthesis.onvoiceschanged=_kdlLoadVoices;
  // Bug Chrome Android : speechSynthesis se met en pause après ~15s, on la relance

function speak(text,lang){
  if(!text||!text.trim())return;
  if(!("speechSynthesis" in window))return;
  const langMap={fr:"fr-FR",en:"en-US",yo:"fr-FR",ad:"fr-FR"};
  const bcp=langMap[lang]||"fr-FR";
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const voices=_kdlVoices.length?_kdlVoices:speechSynthesis.getVoices();
  const ev=voices.find(v=>v.lang===bcp);
  const pv=voices.find(v=>v.lang.startsWith(bcp.split("-")[0]));
  if(ev)u.voice=ev;else if(pv)u.voice=pv;
  u.lang=bcp;
  u.rate=lang==="yo"||lang==="ad"?0.65:0.78;
  u.pitch=1.1;
  u.volume=1;
  window._kdlUtterance=u; // évite le garbage collection (bug Chrome)
  speechSynthesis.speak(u);
}

    h+=`<div class="pstatgrid">${[["47","Mots appris"],["12","Sessions"],["85%","Réussite"],["3🔥","Série"]].map(([v,l])=>`<div class="pstatcard"><div style="font-size:24px;font-weight:900;color:#212121">${v}</div><div style="font-size:11px;color:#9E9E9E;margin-top:2px;font-weight:700">${l}</div></div>`).join("")}</div>`;
    h+=`<div class="slbl">Progression par module</div><div class="domprog">`;
    MODULES.forEach((m,i)=>{h+=`<div class="dprow"><div class="dplbl">${m.icon} ${tl(m.name)}</div><div class="dpbarbg"><div class="dpbar" style="width:${Math.round((moduleProgress[m.id]||0)*100)}%;background:${DC[i%DC.length]}"></div></div><div class="dppct">${Math.round((moduleProgress[m.id]||0)*100)}%</div></div>`;});
    h+=`</div><div class="langbox"><div style="font-size:12px;font-weight:800;color:#4A148C">🌐 Langues actives</div><div class="langpills">${[["fr","🇫🇷 Français","#2E7D32","#E8F5E9"],["en","🇬🇧 English","#0D47A1","#E3F2FD"],["yo","🇳🇬 Yoruba","#E65100","#FFF3E0"],["ad","🇧🇯 Adja","#AD1457","#FCE4EC"]].map(([l,label,c,bg])=>`<button class="langpill" style="background:${S.activeLangs[l]?c:bg};color:${S.activeLangs[l]?"#fff":c};border-color:${c}" onclick="S.activeLangs['${l}']=!S.activeLangs['${l}'];render()">${label} ${S.activeLangs[l]?"✓":""}</button>`).join("")}</div></div>`;
    h+=`<button onclick="S.screen='audiodiag';render()" style="width:100%;background:#fff;color:#4A148C;border:2px solid #CE93D8;border-radius:14px;padding:12px;font-size:13px;font-weight:900;cursor:pointer;margin-top:13px;font-family:'Nunito',sans-serif">🔍 Diagnostic audio vocal</button>`;
  }
  else if(S.screen==="reward"){h+=rewardScreen();}
  else if(S.screen==="audiodiag"){
    h+=gameHeader("🔍 Diagnostic audio","#4A148C");
    const supported="speechSynthesis" in window;
    const voices=(_kdlVoices&&_kdlVoices.length)?_kdlVoices:(supported?speechSynthesis.getVoices():[]);
    const frVoices=voices.filter(v=>v.lang.toLowerCase().startsWith("fr"));
    h+=`<div class="qcard" style="border-color:#CE93D8;text-align:left;padding:16px">`;
    h+=`<div style="font-size:13px;font-weight:900;color:#4A148C;margin-bottom:10px">État de la synthèse vocale</div>`;
    h+=`<div style="font-size:12px;font-weight:700;color:${supported?"#2E7D32":"#C62828"};margin-bottom:6px">${supported?"✅":"❌"} API disponible : ${supported?"Oui":"Non"}</div>`;
    h+=`<div style="font-size:12px;font-weight:700;color:${voices.length?"#2E7D32":"#C62828"};margin-bottom:6px">${voices.length?"✅":"❌"} Voix détectées : ${voices.length}</div>`;
    h+=`<div style="font-size:12px;font-weight:700;color:${frVoices.length?"#2E7D32":"#C62828"};margin-bottom:10px">${frVoices.length?"✅":"❌"} Voix françaises : ${frVoices.length}</div>`;
    if(voices.length>0){
      h+=`<div style="max-height:160px;overflow-y:auto;background:#F3E5F5;border-radius:10px;padding:8px 10px;font-size:11px;color:#6A1B9A;line-height:1.7">`;
      voices.forEach(v=>{const isFr=v.lang.toLowerCase().startsWith("fr");h+=`<div style="${isFr?"font-weight:900;color:#4A148C":""}">${isFr?"🇫🇷 ":""}${v.lang} — ${v.name}</div>`;});
      h+=`</div>`;
    }
    h+=`</div>`;
    h+=`<button class="nxtbtn" onclick="speak('Bonjour, ceci est un test audio en francais','fr')">🔊 Tester la voix française</button>`;
    h+=`<button class="replybtn" style="margin-top:8px" onclick="_kdlLoadVoices();render()">↺ Recharger la liste des voix</button>`;
    if(!frVoices.length){
      h+=`<div style="background:#FFEBEE;border-radius:12px;padding:12px;margin-top:12px;font-size:12px;color:#C62828;font-weight:700;line-height:1.7">⚠️ Aucune voix française détectée.<br><br>Solution : Paramètres Android → Système → Langues et saisie → Synthèse vocale (Text-to-speech) → moteur <b>Speech Services by Google</b> → ⚙️ → Installer les données vocales → <b>Français</b>.<br><br>Si l'app "Speech Services by Google" n'existe pas, installez-la depuis le Play Store.</div>`;
    }else if(voices.length>0){
      h+=`<div style="background:#E8F5E9;border-radius:12px;padding:12px;margin-top:12px;font-size:12px;color:#2E7D32;font-weight:700;line-height:1.7">✅ Une voix française est installée ! Appuyez sur "Tester la voix française" ci-dessus. Si vous n'entendez rien, vérifiez le volume "Média" (pas la sonnerie) de votre téléphone.</div>`;
    }
    h+=`<button onclick="S.screen='parent';render()" style="width:100%;background:#7E57C2;color:#fff;border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif">← Retour</button>`;
  }
  else if(S.screen==="routine_matin"||S.screen==="routine_soir"){
    const steps=S.screen==="routine_matin"?ROUTINE_MATIN:ROUTINE_SOIR;
    const ic=S.screen==="routine_matin"?"🌅":"🌙";
    h+=gameHeader(`${ic} ${tl(S.screen==="routine_matin"?{fr:"Matin de Kofi",en:"Kofi's morning"}:{fr:"Soir de Kofi",en:"Kofi's evening"})}`,"#3E2A00");
    h+=`<div style="background:#FFFDE7;border-radius:12px;padding:9px 12px;border:1.5px solid #FFE082;margin-bottom:12px;font-size:12px;font-weight:700;color:#F57F17">👆 Appuie sur chaque étape dans l'ordre !</div><div class="rsteps">`;
    steps.forEach((step,i)=>{const done=i<S.routineStep,active=i===S.routineStep;h+=`<div class="rstep ${done?"done":active?"active":""}" onclick="if(${i}===${S.routineStep}){S.routineStep++;S.lastSpokenStep=-1;tone('tick');render();}"><div class="rstepnum">${done?"✓":i+1}</div><div class="rstepic">${step.icon}</div><div class="rsteptxt"><div class="rstepname">${tl(step.name)}</div><div class="rstepsub">${tl(step.sub)}</div></div><div class="rstepchk">✅</div></div>`;});
    h+=`</div>`;
    if(S.routineStep>=steps.length){
      h+=`<button class="rnxtbtn" onclick="tone('reward');confetti();S.screen='home';S.nav='home';render()">🏆 Bravo Kofi ! Retour →</button>`;
      if(S.lastSpokenStep!==steps.length){
        S.lastSpokenStep=steps.length;
        speak(tl({fr:"Bravo Kofi, tu as terminé !",en:"Well done Kofi, you finished!",yo:"Ó dára Kofi, o parí!",ad:"Kofi nyɔ, a wu enɛ!"}),S.lang);
      }
    }else if(S.lastSpokenStep!==S.routineStep){
      S.lastSpokenStep=S.routineStep;
      const cur=steps[S.routineStep];
      speak(tl(cur.name)+". "+tl(cur.sub),S.lang);
    }
  }
  else if(S.screen==="manners"||S.screen==="hygiene"){
    const data=S.screen==="manners"?MANNERS:HYGIENE;
    const hdrIcon=S.screen==="manners"?"👐":"🦷";
    const hdrTitle=S.screen==="manners"?"Bonnes manières":"Hygiène";
    const hdrColor=S.screen==="manners"?"#1B5E20":"#003330";
    const cardBg=S.screen==="manners"?"#E8F5E9":"#E0F7FA";
    const cardBorder=S.screen==="manners"?"#A5D6A7":"#80CBC4";
    const titleColor=S.screen==="manners"?"#1B5E20":"#003330";
    const textColor=S.screen==="manners"?"#2E7D32":"#00695C";
    const item=data[S.cardStep];
    const itemSub=S.screen==="manners"?tl(item.text):tl(item.sub);
    h+=gameHeader(`${hdrIcon} ${hdrTitle}`,hdrColor);
    h+=`<div class="progrow">${data.map((_,i)=>`<div class="pdot" style="background:${i<S.cardStep?"#43A047":i===S.cardStep?"#F9A825":"#E0E0E0"}"></div>`).join("")}</div>`;
    h+=`<div class="qcard" style="border-color:${cardBorder}">
      <div class="qimg" style="background:${cardBg};position:relative">
        <span style="font-size:56px">${item.icon}</span>
        <button class="sndbtn" onclick="speakCurrentCard()">🔊</button>
      </div>
      <div class="qtxt" style="color:${titleColor}">${tl(item.title)}</div>
      <div style="font-size:13px;color:${textColor};font-weight:700;line-height:1.6;margin-top:8px">${itemSub}</div>
    </div>`;
    h+=`<div style="display:flex;gap:8px">`;
    if(S.cardStep>0)h+=`<button class="replybtn" style="flex:1" onclick="S.cardStep--;S.lastSpokenCard=-1;render()">◀ Précédent</button>`;
    if(S.cardStep<data.length-1)h+=`<button class="nxtbtn" style="flex:1;margin-bottom:0" onclick="S.cardStep++;S.lastSpokenCard=-1;render()">Suivant ▶</button>`;
    else h+=`<button class="nxtbtn" style="flex:1;margin-bottom:0;background:#43A047" onclick="tone('reward');confetti();S.screen='home';S.nav='home';render()">🏆 Terminé !</button>`;
    h+=`</div>`;
    h+=`<button onclick="S.screen='home';S.nav='home';render()" style="width:100%;background:transparent;color:#9E9E9E;border:none;padding:10px;font-size:12px;font-weight:800;cursor:pointer;margin-top:6px;font-family:'Nunito',sans-serif">← Retour à l'accueil</button>`;
    if(S.lastSpokenCard!==S.cardStep){
      S.lastSpokenCard=S.cardStep;
      speak(tl(item.title)+". "+itemSub,S.lang);
    }
  }
  else if(S.screen==="body"){
    h+=gameHeader("👦 Mon corps","#0D47A1");
    const parts=[{id:"head",label:{fr:"La tête",en:"Head",yo:"Orí",ad:"Ta"},icon:"🗣️"},{id:"eye",label:{fr:"Les yeux",en:"Eyes",yo:"Ojú",ad:"Nunɔ"},icon:"👁️"},{id:"ear",label:{fr:"Les oreilles",en:"Ears",yo:"Etí",ad:"Toɖo"},icon:"👂"},{id:"nose",label:{fr:"Le nez",en:"Nose",yo:"Imú",ad:"Aŋu"},icon:"👃"},{id:"mouth",label:{fr:"La bouche",en:"Mouth",yo:"Ẹnu",ad:"Nu"},icon:"👄"},{id:"arm",label:{fr:"Le bras",en:"Arm",yo:"Apá",ad:"Asi"},icon:"💪"},{id:"hand",label:{fr:"La main",en:"Hand",yo:"Ọwọ́",ad:"Alɔ"},icon:"✋"},{id:"belly",label:{fr:"Le ventre",en:"Belly",yo:"Inú",ad:"Ayi"},icon:"🫃"},{id:"leg",label:{fr:"La jambe",en:"Leg",yo:"Ẹsẹ̀",ad:"Afɔ"},icon:"🦵"},{id:"foot",label:{fr:"Le pied",en:"Foot",yo:"Atẹlẹsẹ̀",ad:"Afɔgbe"},icon:"🦶"}];
    h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px">`;
    parts.forEach(p=>{const a=S.bodyPart===p.id;h+=`<div onclick="S.bodyPart='${p.id}';speak('${tl(p.label)}','${S.lang}');tone('tick');render()" style="background:${a?"#1565C0":"#E3F2FD"};border:2px solid ${a?"#1565C0":"#90CAF9"};border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer"><div style="font-size:26px">${p.icon}</div><div style="font-size:11px;font-weight:900;color:${a?"#fff":"#0D47A1"};margin-top:4px">${tl(p.label)}</div></div>`;});
    h+=`</div>`;
    if(S.bodyPart){const p=parts.find(x=>x.id===S.bodyPart);if(p)h+=`<div style="background:#E3F2FD;border-radius:16px;padding:14px;border:2px solid #1E88E5;margin-bottom:12px;text-align:center"><div style="font-size:32px;margin-bottom:8px">${p.icon}</div><div style="font-size:20px;font-weight:900;color:#0D47A1;margin-bottom:10px">${tl(p.label)}</div><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">${["fr","en","yo","ad"].map(l=>`<span onclick="speak('${p.label[l]}','${l}')" style="cursor:pointer;background:#fff;border:1.5px solid #90CAF9;border-radius:9px;padding:4px 10px;font-size:11px;font-weight:700;color:#1565C0">${{fr:"🇫🇷",en:"🇬🇧",yo:"🇳🇬",ad:"🇧🇯"}[l]} ${p.label[l]}</span>`).join("")}</div><button onclick="speak('${tl(p.label)}','${S.lang}')" style="margin-top:10px;background:#1E88E5;color:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif">🔊 Écouter</button></div>`;}
    h+=`<button onclick="S.screen='home';S.nav='home';render()" style="width:100%;background:#7E57C2;color:#fff;border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif">← Retour</button>`;
  }
  else if(S.screen==="alphabet"){
    const al=ALPHABET.find(a=>a.letter===S.alphLetter)||ALPHABET[0];
    const alEmoji=(S.lang==="en"&&al.emojiEn)?al.emojiEn:al.emoji;
    const flagMap={fr:"🇫🇷",en:"🇬🇧",yo:"🇳🇬",ad:"🇧🇯"};
    const letterLang=S.lang==="en"?"en":"fr";
    h+=gameHeader("🔤 L'alphabet","#880E4F");
    h+=`<div class="alphscene"><div class="alphgrid">${ALPHABET.map(a=>`<button class="alphbtn ${S.alphLetter===a.letter?"on":""}" onclick="S.alphLetter='${a.letter}';speak('${a.letter}','${letterLang}');tone('click');render()">${a.letter}</button>`).join("")}</div><div class="alphword"><div class="alphword-letter">${al.letter}</div><div class="alphword-img">${alEmoji}</div><div class="alphword-example">${tl(al.word)}</div><div class="alphword-langs"><span class="alphword-pill" style="background:#E8F5E9;color:#1B5E20">🇫🇷 ${al.word.fr}</span><span class="alphword-pill" style="background:#E3F2FD;color:#0D47A1">🇬🇧 ${al.word.en}</span><span class="alphword-pill" style="background:#FFF3E0;color:#E65100">🇳🇬 ${al.word.yo}</span><span class="alphword-pill" style="background:#FCE4EC;color:#AD1457">🇧🇯 ${al.word.ad}</span></div><div style="display:flex;gap:7px;justify-content:center;margin-top:12px;flex-wrap:wrap"><button style="padding:7px 14px;border-radius:12px;background:#E91E63;color:#fff;border:none;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif" onclick="speak('${al.letter}','${letterLang}')">🔊 ${al.letter}</button><button style="padding:7px 14px;border-radius:12px;background:#1565C0;color:#fff;border:none;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif" onclick="speak('${tl(al.word)}','${S.lang}')">${flagMap[S.lang]} ${tl(al.word)}</button></div></div></div>`;
    h+=`<button onclick="S.screen='home';S.nav='home';render()" style="width:100%;background:#7E57C2;color:#fff;border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif">← Retour</button>`;
  }
  else if(S.screen==="syllabes"){
    const key=S.syllC+"+"+S.syllV,sy=SYLLAB_WORDS[key]||{word:S.syllC+S.syllV,repeat:S.syllC+S.syllV+S.syllC+S.syllV};
    h+=gameHeader("📖 Syllabes","#4A148C");
    h+=`<div class="slbl">1. Choisis une consonne</div><div class="consrow">${CONSONANTS.map(c=>`<button class="cbtn ${S.syllC===c?"on":""}" onclick="S.syllC='${c}';speak('${c}','fr');tone('click');render()">${c}</button>`).join("")}</div>`;
    h+=`<div class="slbl">2. Choisis une voyelle</div><div class="vowrow">${VOWELS.map(v=>`<button class="vbtn ${S.syllV===v?"on":""}" onclick="S.syllV='${v}';speak('${v}','fr');tone('click');render()">${v}</button>`).join("")}</div>`;
    h+=`<div class="sylarea"><div style="font-size:11px;font-weight:800;color:#6A1B9A;margin-bottom:12px;text-align:center">3. Assemble la syllabe</div><div class="sylrow"><div class="lbox cons">${S.syllC}</div><div class="opsign">+</div><div class="lbox vow">${S.syllV}</div><div class="opsign">=</div><div class="lbox res" onclick="speak('${sy.word}','fr')">${sy.word}</div></div><div class="sndbtnrow"><button class="schip" style="background:#EDE7F6;color:#4A148C" onclick="speak('${S.syllC}','fr')">🔊 ${S.syllC}</button><button class="schip" style="background:#FCE4EC;color:#AD1457" onclick="speak('${S.syllV}','fr')">🔊 ${S.syllV}</button><button class="schip" style="background:#7E57C2;color:#fff" onclick="speak('${sy.word}','fr')">🔊 ${sy.word}</button></div><div style="margin-top:14px;border-top:1.5px solid #EDE7F6;padding-top:12px"><div style="font-size:11px;font-weight:800;color:#6A1B9A;margin-bottom:12px;text-align:center">4. Répète pour faire un mot</div><div class="sylrow" style="justify-content:center"><div class="lbox cons" style="width:48px;height:54px;font-size:22px">${sy.word}</div><div class="opsign" style="font-size:18px">+</div><div class="lbox vow" style="width:48px;height:54px;font-size:22px">${sy.word}</div><div class="opsign" style="font-size:18px">=</div><div class="lbox res2" style="width:82px;font-size:20px" onclick="speak('${sy.repeat}','fr')">${sy.repeat}</div></div>${sy.rmeaning?`<div class="wordmeaning">💡 <span>${sy.repeat}</span> = ${tl(sy.rmeaning)}</div>`:""}<div class="sndbtnrow" style="margin-top:10px"><button class="schip" style="background:#4A148C;color:#fff;font-size:13px" onclick="speak('${sy.repeat}','fr')">🔊 « ${sy.repeat} »</button></div></div></div>`;
    h+=`<button onclick="S.screen='home';S.nav='home';render()" style="width:100%;background:#7E57C2;color:#fff;border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif">← Retour</button>`;
  }
  else if(S.screen==="count"){
    const lvl=COUNT_LEVELS[S.countIdx];
    h+=gameHeader("🔢 Compter","#1A0035");
    h+=`<div class="progrow">${COUNT_LEVELS.map((_,i)=>`<div class="pdot" style="background:${i<S.countIdx?"#43A047":i===S.countIdx?"#F9A825":"#E0E0E0"}"></div>`).join("")}</div>`;
    h+=`<div class="countscene"><div style="font-size:12px;font-weight:800;color:#6A1B9A;margin-bottom:8px;text-align:center">Compte les objets !</div><div class="objrow">`;
    for(let i=0;i<lvl.count;i++)h+=`<div class="obj lit">${lvl.obj}</div>`;
    h+=`</div><div style="font-size:12px;font-weight:800;color:#9E9E9E;margin-bottom:8px;text-align:center">Combien y en a-t-il ?</div><div class="numchoices">`;
    lvl.choices.forEach((num,idx)=>{const ic=num===lvl.answer;h+=`<button class="nchoice${S.countSel===idx?(ic?" correct":" wrong"):""}" onclick="if(S.countSel!==null)return;S.countSel=${idx};if(${ic}){tone('correct');speak('${tl(lvl.word)}','${S.lang}');setTimeout(()=>{if(${S.countIdx}<${COUNT_LEVELS.length-1}){S.countIdx++;S.countSel=null;}else{clearInterval(S.timerIv);tone('reward');confetti();S.screen='reward';S.score=S.countIdx+1;}render();},1000);}else{tone('wrong');setTimeout(()=>{S.countSel=null;render();},900);}render()">${num}</button>`;});
    h+=`</div><div style="text-align:center;margin-top:10px;font-size:13px;font-weight:700;color:#9E9E9E">${S.countIdx+1} / ${COUNT_LEVELS.length}</div></div>`;
  }
  else if(S.screen==="colorgame")h+=buildColorGame();
  else if(S.screen==="animalgame")h+=buildAnimalGame();
  else if(S.screen==="emogame")h+=buildEmoGame();
  else if(S.screen==="social"){
    h+=gameHeader("👨‍👩‍👧 Ma famille & mon monde","#3E0F00");
    SOCIAL_DATA.forEach(s=>{h+=`<div class="mancard" style="border-color:#FFAB91"><div class="manic" style="background:#FBE9E7">${s.emoji}</div><div><div style="font-size:13px;font-weight:900;color:#BF360C;margin-bottom:3px">${tl(s.label)}</div><div style="font-size:12px;color:#D84315;font-weight:700;line-height:1.5">${tl(s.desc)}</div></div></div>`;});
    h+=`<button onclick="S.screen='home';S.nav='home';render()" style="width:100%;background:#7E57C2;color:#fff;border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Nunito',sans-serif">← Retour</button>`;
  }
  sc.innerHTML=h;
}
render();
</script>
</body>
</html>
